<!DOCTYPE html>
<html>
<head>
    <title>Giới thiệu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Trang giới thiệu</h1>
</body>
</html>

<form action="https://formspree.io/f/meewdakg" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Họ tên"
        required>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <textarea
        name="message"
        placeholder="Nội dung">
    </textarea>

    <button type="submit">
        Gửi
    </button>

</form>
